name: Build EDRSandblast
on: [workflow_dispatch] # Permet de lancer la compilation manuellement
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
    - name: Build Solution
      run: msbuild EDRSandblast.sln /p:Configuration=Release /p:Platform=x64
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: EDRSandblast-exe
        path: x64/Release/EDRSandblast.exe
